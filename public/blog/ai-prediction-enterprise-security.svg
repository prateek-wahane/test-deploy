<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="url(#grid)"/>
  
  <!-- AI prediction visualization -->
  <g id="prediction-nodes">
    <!-- Left side: data sources -->
    <circle cx="150" cy="150" r="35" fill="#3b82f6" opacity="0.2"/>
    <circle cx="150" cy="150" r="30" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
    <text x="150" y="155" text-anchor="middle" font-size="12" font-family="Arial" fill="#93c5fd" font-weight="bold">DATA</text>
    
    <circle cx="150" cy="300" r="35" fill="#3b82f6" opacity="0.2"/>
    <circle cx="150" cy="300" r="30" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
    <text x="150" y="305" text-anchor="middle" font-size="12" font-family="Arial" fill="#93c5fd" font-weight="bold">LOGS</text>
    
    <circle cx="150" cy="450" r="35" fill="#3b82f6" opacity="0.2"/>
    <circle cx="150" cy="450" r="30" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
    <text x="150" y="455" text-anchor="middle" font-size="12" font-family="Arial" fill="#93c5fd" font-weight="bold">ALERTS</text>
    
    <!-- Center: AI Processing -->
    <circle cx="600" cy="300" r="60" fill="url(#accentGradient)" opacity="0.2"/>
    <circle cx="600" cy="300" r="55" fill="none" stroke="url(#accentGradient)" stroke-width="3" opacity="0.8"/>
    
    <!-- AI Core elements -->
    <circle cx="600" cy="300" r="40" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.6" stroke-dasharray="5,5"/>
    <circle cx="570" cy="280" r="8" fill="#a78bfa" opacity="0.7"/>
    <circle cx="600" cy="265" r="8" fill="#a78bfa" opacity="0.7"/>
    <circle cx="630" cy="280" r="8" fill="#a78bfa" opacity="0.7"/>
    <circle cx="570" cy="320" r="8" fill="#a78bfa" opacity="0.7"/>
    <circle cx="630" cy="320" r="8" fill="#a78bfa" opacity="0.7"/>
    
    <text x="600" y="310" text-anchor="middle" font-size="14" font-family="Arial" fill="#e9d5ff" font-weight="bold">AI</text>
    <text x="600" y="330" text-anchor="middle" font-size="11" font-family="Arial" fill="#c4b5fd" font-weight="normal">PREDICTION</text>
    
    <!-- Connecting lines from data to AI -->
    <line x1="185" y1="150" x2="550" y2="270" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
    <line x1="185" y1="300" x2="545" y2="300" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
    <line x1="185" y1="450" x2="550" y2="330" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
    
    <!-- Right side: outputs -->
    <circle cx="1050" cy="150" r="35" fill="#8b5cf6" opacity="0.2"/>
    <circle cx="1050" cy="150" r="30" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
    <text x="1050" y="155" text-anchor="middle" font-size="12" font-family="Arial" fill="#d8b4fe" font-weight="bold">THREATS</text>
    
    <circle cx="1050" cy="300" r="35" fill="#8b5cf6" opacity="0.2"/>
    <circle cx="1050" cy="300" r="30" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
    <text x="1050" y="305" text-anchor="middle" font-size="12" font-family="Arial" fill="#d8b4fe" font-weight="bold">RISKS</text>
    
    <circle cx="1050" cy="450" r="35" fill="#8b5cf6" opacity="0.2"/>
    <circle cx="1050" cy="450" r="30" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
    <text x="1050" y="455" text-anchor="middle" font-size="12" font-family="Arial" fill="#d8b4fe" font-weight="bold">ACTIONS</text>
    
    <!-- Connecting lines from AI to outputs -->
    <line x1="655" y1="270" x2="1015" y2="150" stroke="#8b5cf6" stroke-width="2" opacity="0.4"/>
    <line x1="660" y1="300" x2="1015" y2="300" stroke="#8b5cf6" stroke-width="2" opacity="0.4"/>
    <line x1="655" y1="330" x2="1015" y2="450" stroke="#8b5cf6" stroke-width="2" opacity="0.4"/>
  </g>
  
  <!-- Title and subtitle -->
  <text x="600" y="520" text-anchor="middle" font-size="36" font-family="Arial" fill="#f1f5f9" font-weight="bold">
    AI-Powered Security Prediction
  </text>
  <text x="600" y="560" text-anchor="middle" font-size="18" font-family="Arial" fill="#cbd5e1">
    Enterprise Threat Detection &amp; Response Automation
  </text>
  
  <!-- Accent elements -->
  <circle cx="50" cy="50" r="15" fill="#3b82f6" opacity="0.3"/>
  <circle cx="1150" cy="550" r="25" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="1150" cy="50" r="18" fill="#a78bfa" opacity="0.25"/>
</svg>